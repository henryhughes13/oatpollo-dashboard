// \u2500\u2500 VANILLA CSV PARSER \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function parseCSV(text) {
  var rows = [];
  var lines = text.split(/\r?\
/);
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    if (!line.trim()) continue;
    var row = [];
    var cur = '';
    var inQ = false;
    for (var j = 0; j < line.length; j++) {
      var ch = line[j];
      if (ch === '"') {
        if (inQ && line[j+1] === '"') { cur += '"'; j++; }
        else { inQ = !inQ; }
      } else if (ch === ',' && !inQ) {
        row.push(cur.trim()); cur = '';
      } else {
        cur += ch;
      }
    }
    row.push(cur.trim());
    rows.push(row);
  }
  return rows;
}


// Parse a single CSV line into an array of fields
function parseLine(line) {
  var row = [], cur = '', inQ = false;
  for (var j = 0; j < line.length; j++) {
    var ch = line[j];
    if (ch === '"') {
      if (inQ && line[j+1] === '"') { cur += '"'; j++; }
      else { inQ = !inQ; }
    } else if (ch === ',' && !inQ) {
      row.push(cur.trim()); cur = '';
    } else {
      cur += ch;
    }
  }
  row.push(cur.trim());
  return row;
}

// \u2500\u2500 SHAREPOINT AUTH \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
var _graphToken = null;
var _tokenExpiry = 0;

async function getDigest() {
  var r = await fetch(SP_SITE + '/_api/contextinfo', {
    method: 'POST',
    headers: { 'Accept': 'application/json;odata=verbose' }
  });
  if (!r.ok) throw new Error('contextinfo failed: ' + r.status);
  var d = await r.json();
  return d.d.GetContextWebInformation.FormDigestValue;
}

async function getGraphToken() {
  if (_graphToken && Date.now() < _tokenExpiry) return _graphToken;
  try {
    var digest = await getDigest();
    var r = await fetch('https://bobosoatbars.sharepoint.com/_api/SP.OAuth.Token/Acquire', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json;odata=verbose',
        'Accept': 'application/json;odata=verbose',
        'X-RequestDigest': digest
      },
      body: JSON.stringify({ resource: 'https://graph.microsoft.com' })
    });
    if (!r.ok) throw new Error('token acquire failed: ' + r.status);
    var d = await r.json();
    _graphToken = d.d.BearerToken;
    _tokenExpiry = Date.now() + 55 * 60 * 1000; // 55 min
    return _graphToken;
  } catch(e) {
    console.warn('Graph token failed, will use SP REST fallback:', e.message);
    return null;
  }
}

async function fetchFileContent(itemId, driveId) {
  driveId = driveId || DRIVE_ID;
  // Try Graph API first
  try {
    var token = await getGraphToken();
    if (token) {
      var r = await fetch('https://graph.microsoft.com/v1.0/drives/' + driveId + '/items/' + itemId + '/content', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (r.ok) return r.text();
    }
  } catch(e) { console.warn('Graph fetch failed:', e.message); }
  // Fallback: SharePoint REST API (same-origin, uses session cookie)
  try {
    var r2 = await fetch(SP_SITE + '/_api/v2.1/drives/' + driveId + '/items/' + itemId + '/content', {
      headers: { 'Accept': 'text/plain' }
    });
    if (r2.ok) return r2.text();
  } catch(e2) { console.warn('SP REST fetch failed:', e2.message); }
  throw new Error('All fetch methods failed for item ' + itemId);
}

async function fetchFileAsCSV(itemId, driveId) {
  driveId = driveId || DRIVE_ID;
  // Request XLSX\u2192CSV conversion via SharePoint REST
  var url = SP_SITE + '/_api/v2.1/drives/' + driveId + '/items/' + itemId + '/content?format=csv';
  try {
    var r = await fetch(url, { headers: { 'Accept': 'text/plain, text/csv' } });
    if (r.ok) return r.text();
    throw new Error('CSV convert failed: ' + r.status);
  } catch(e) {
    // If conversion fails, try Graph token approach
    var token = await getGraphToken();
    if (token) {
      var r2 = await fetch('https://graph.microsoft.com/v1.0/drives/' + driveId + '/items/' + itemId + '/content', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (r2.ok) return r2.text();
    }
    throw e;
  }
}

// The Tier Summaries file is a pivot table with onshelf months by tier.
// It does NOT have per-account rows \u2014 we use it to validate/update our
// TRANSITION_DATES map and update the ONSHELF_SCHEDULE with live store counts.
function parseTierSummary(csvText) {
  var rows = parseCSV(csvText);
  var updates = { schedule: {}, accountDates: {} };
  // Look for month rows \u2014 they follow the pattern: "Mar '26", "Apr '26", etc.
  var monthMap = {
    "Mar '26": 'Mar 2026', "Apr '26": 'Apr 2026', "May '26": 'May 2026',
    "Jun '26": 'Jun 2026', "Jul '26": 'Jul 2026', "Aug '26": 'Aug 2026',
    "Nov '26": 'Nov 2026'
  };
  var monthDates = {
    "Mar '26": '2026-03-01', "Apr '26": '2026-04-15', "May '26": '2026-05-01',
    "Jun '26": '2026-06-01', "Jul '26": '2026-07-01', "Aug '26": '2026-08-01',
    "Nov '26": '2026-11-01'
  };
  for (var i = 0; i < rows.length; i++) {
    var row = rows[i];
    var cell0 = (row[0] || '').trim();
    if (monthMap[cell0]) {
      var monthLabel = monthMap[cell0];
      var aAccts  = parseInt(row[1]) || 0;
      var aStores = parseInt((row[2]||'').replace(/,/g,'')) || 0;
      var bAccts  = parseInt(row[3]) || 0;
      var bStores = parseInt((row[4]||'').replace(/,/g,'')) || 0;
      if (ONSHELF_SCHEDULE[monthLabel]) {
        ONSHELF_SCHEDULE[monthLabel].aAccts  = aAccts;
        ONSHELF_SCHEDULE[monthLabel].aStores = aStores;
        ONSHELF_SCHEDULE[monthLabel].bAccts  = bAccts;
        ONSHELF_SCHEDULE[monthLabel].bStores = bStores;
      }
      updates.schedule[monthLabel] = { aAccts, aStores, bAccts, bStores, date: monthDates[cell0] };
    }
  }
  return updates;
}

// Parse UNFI SBO CSV \u2192 {accountName: {newU, oldU}}  (uses parseLine, not parseCSV)
// Structure: 6 metadata rows, then header row 6, data from row 7
// Cols: UPC(0), SKU(1), Desc(2), Brand(3), MasterPack(4), UNFIPack(5), Size(6), Unit(7), DC(8), Week1(9)...
// Week1 = most recent (3/22/2026)
function parseUNFISBO(csvText) {
  var lines = csvText.split(/\r?\
/);
  var result = { newU: 0, oldU: 0, byDC: {}, wfNewU: 0, wfOldU: 0 };

  // Find header row (contains "Supplier Prod ID")
  var headerIdx = -1;
  for (var i = 0; i < 15; i++) {
    if (lines[i] && lines[i].indexOf('Supplier Prod ID') > -1) { headerIdx = i; break; }
  }
  if (headerIdx === -1) return result;

  for (var i = headerIdx + 1; i < lines.length; i++) {
    var row = parseLine(lines[i]);
    if (row.length < 10) continue;
    var sku  = row[1].trim();
    var dc   = row[8].trim();
    var wk1  = parseFloat(row[9]) || 0;  // Week beginning 3/22 (most recent)

    if (!sku || !dc || dc === 'DC') continue;

    var isNew = NEW_SKUS.indexOf(sku) > -1;
    var isOld = OLD_SKUS.indexOf(sku) > -1;
    if (!isNew && !isOld) continue;

    var isWF = WHOLE_FOODS_DC_PATTERN.test(dc);

    if (isNew) {
      result.newU += wk1;
      if (isWF) result.wfNewU += wk1;
    }
    if (isOld) {
      result.oldU += wk1;
      if (isWF) result.wfOldU += wk1;
    }

    // Track by DC for ship-to tab (Session 4)
    if (!result.byDC[dc]) result.byDC[dc] = { newU: 0, oldU: 0 };
    if (isNew) result.byDC[dc].newU += wk1;
    if (isOld) result.byDC[dc].oldU += wk1;
  }

  return result;
}

// Apply UNFI data to DATA array
// NOTE: UNFI SBO does not break out by retailer \u2014 only by DC.
// The total newU across all DCs (1459) matches our known WE 3/22 figure.
// Whole Foods is "Confidential" \u2014 their volume is within the total but not
// separately identifiable by DC code. We preserve the hardcoded WF values
// from the fallback data (1459 new, 1123 old) and update them if the live
// total differs significantly from the expected baseline.
function applyUNFIData(unfiResult) {
  var expectedTotal = 1459;  // WE 3/22 baseline
  var liveTotal = unfiResult.newU;
  var ratio = liveTotal > 0 ? liveTotal / expectedTotal : 1;

  DATA.forEach(function(a) {
    if (a.name === 'Whole Foods (Confidential)') {
      // Scale WF values if live data differs from baseline
      if (liveTotal > 0 && Math.abs(ratio - 1) > 0.05) {
        // Data has changed \u2014 scale proportionally
        a.newU = Math.round(a.newU * ratio);
        a.oldU = unfiResult.oldU > 0 ? Math.round(a.oldU * (unfiResult.oldU / 7206)) : a.oldU;
      }
      // Otherwise keep fallback values (they're already accurate for WE 3/22)
    }
    // Re-derive status after data update
    a.status = ds(a.photos, a.newU, a.keheN);
  });

  // Store total for trend tracking
  window._unfiTotalNewU = liveTotal;
  window._unfiTotalOldU = unfiResult.oldU;
}


// Parse KeHE Chains CSV \u2192 {accountName: {shipped, stores}}
// Hierarchy: col0=chain parent, col6=SKU description (new items have "7.8 OZ" or "10.5 OZ")
// After proper CSV parsing (quoted numbers like "7,104"):
//   Chain row: col0=name, col13=ordered(quoted), col15=shipped(quoted), col20=stores, col21=SKU count
//   SKU item row: col6=description, col13=shipped units, col20=stores ordering that SKU
function parseKeHE(csvText) {
  var lines = csvText.split(/\r?\
/);
  var result = {};
  var currentChain = null;
  var currentChainShipped = 0;
  var currentChainStores  = 0;
  var chainNewItems = false;

  for (var i = 0; i < lines.length; i++) {
    var row = parseLine(lines[i]);
    if (row.length < 7) continue;

    var col0 = (row[0]||'').trim();
    var col1 = (row[1]||'').trim();
    var col2 = (row[2]||'').trim();
    var col6 = (row[6]||'').trim();

    // Level-1 chain parent: col0 non-empty, col1 + col2 empty
    if (col0 && !col1 && !col2) {
      // Save previous chain
      if (currentChain && chainNewItems) {
        var mapped = normalizeKeHEName(currentChain);
        if (mapped) {
          if (!result[mapped]) result[mapped] = { shipped: 0, stores: 0 };
          result[mapped].shipped += currentChainShipped;
          if (result[mapped].stores === 0) result[mapped].stores = currentChainStores;
        }
      }
      currentChain = col0;
      currentChainShipped = 0;
      currentChainStores  = parseInt((row[20]||'').replace(/[,"]/g,'')) || 0;
      chainNewItems = false;
      continue;
    }

    // SKU item row: col6 contains "7.8 OZ" or "10.5 OZ" \u2192 new Oatpollo item
    if (col6 && (col6.indexOf('7.8 OZ') > -1 || col6.indexOf('10.5 OZ') > -1)) {
      chainNewItems = true;
      // Shipped units in col13 for item-level rows
      var skuShipped = parseInt((row[13]||'').replace(/[,"]/g,'')) || 0;
      currentChainShipped += skuShipped;
    }
  }

  // Save last chain
  if (currentChain && chainNewItems) {
    var mapped = normalizeKeHEName(currentChain);
    if (mapped) {
      if (!result[mapped]) result[mapped] = { shipped: 0, stores: 0 };
      result[mapped].shipped += currentChainShipped;
      if (result[mapped].stores === 0) result[mapped].stores = currentChainStores;
    }
  }

  return result;
}

function parseResetDates(csvText) {
  var rows = parseCSV(csvText);
  var result = {};
  var monthMap = {jan:"01",feb:"02",mar:"03",apr:"04",may:"05",jun:"06",jul:"07",aug:"08",sep:"09",oct:"10",nov:"11",dec:"12"};
  var headerIdx = -1;
  for (var i = 0; i < Math.min(10, rows.length); i++) {
    for (var j = 0; j < rows[i].length; j++) {
      if ((rows[i][j]||"").toLowerCase().trim() === "account") { headerIdx = i; break; }
    }
    if (headerIdx > -1) break;
  }
  if (headerIdx === -1) return result;
  var hdr = rows[headerIdx];
  var acctCol = 2, onshelfCol = 32;
  for (var j = 0; j < hdr.length; j++) {
    var h = (hdr[j]||"").toLowerCase().trim();
    if (h === "account") acctCol = j;
    if (h.indexOf("onshelf") > -1) onshelfCol = j;
    else if (h.indexOf("on shelf") > -1) onshelfCol = j;
  }
  function parseDC(val) {
    if (!val) return null;
    var v = val.trim().toLowerCase().replace(/'/g,"").replace(/\s+/g," ");
    var m = v.match(/^([a-z]{3})\s*(\d{2,4})$/);
    if (m) { var mn = monthMap[m[1]]; var yr = m[2].length===2?"20"+m[2]:m[2]; if (mn) return yr+"-"+mn+"-01"; }
    var d = new Date(val); if (!isNaN(d.getTime())) return d.toISOString().substring(0,10);
    return null;
  }
  for (var i = headerIdx+1; i < rows.length; i++) {
    var row = rows[i];
    var acct = (row[acctCol]||"").trim();
    if (!acct || acct.toLowerCase().indexOf("please") > -1) continue;
    var iso = parseDC((row[onshelfCol]||"").trim());
    if (iso) result[acct] = iso;
  }
  return result;
}
function applyResetDates(resetMap) {
  var dashNames = DATA.map(function(a){return a.name;});
  Object.keys(resetMap).forEach(function(raw) {
    var iso = resetMap[raw];

async function fetchPhotos() {

function applyPhotos(items) {

  var label = d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
  var col, bg, txt, badge='';

  if (diff < 0) { col='#791F1F'; bg='#FCEBEB'; txt=label+' ('+Math.abs(diff)+'d past)'; if(ns) badge=' <span style="font-size:9px;padding:1px 5px;border-radius:3px;background:#A32D2D;color:#fff;font-weight:700">OVERDUE</span>'; }

  else if (diff<=14) { col='#633806'; bg='#FAEEDA'; txt=label+' ('+diff+'d)'; }

  return '<span style="font-size:11px;padding:2px 7px;border-radius:99px;background:'+bg+';color:'+col+';font-weight:600;white-space:nowrap">'+txt+'</span>'+badge;
